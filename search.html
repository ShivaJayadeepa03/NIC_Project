<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIC Code Search</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <img src="/static/logo.jpeg" alt="Application Logo" class="app-logo">
        </div>
        <nav class="nav-buttons">
            <a href="/">
                <button class="btn">Home</button>
            </a>
            <a href="/info">
                <button class="btn">Categories</button>
            </a>
            <a href="/search">
                <button class="btn active">Code Lookup</button>
            </a>
        </nav>
    </header>

    <main class="container search-page">
        <section class="info-intro">
            <h2>Search by NIC Code</h2>
            <p>Enter a NIC division, group, class or subclass code to see the corresponding business activity description.</p>
        </section>

        <section class="search-section">
            <div class="search-box" style="flex-direction: column; gap: 12px;">
                <div style="display: flex; gap: 10px; width: 100%;">
                    <input
                        id="codeInput"
                        type="text"
                        placeholder="Examples: 01, 011, 0111, 01111"
                        style="width: 100%; padding: 10px; font-size: 1rem;"
                    />
                    <button class="btn-search" id="searchButton" style="white-space: nowrap;">Search Code</button>
                </div>
            </div>
        </section>

        <section class="results-wrapper">
            <div class="results-header">
                <h3 id="searchTitle">Search Result</h3>
            </div>
            <div id="searchResult" class="codes-list" style="background:#fafafa; border-radius:8px; padding:16px; min-height:40px;">
                <div class="placeholder-state">
                    <p>Start by entering a NIC code.</p>
                </div>
            </div>
        </section>

        <section class="info-grid" style="margin-top: 32px;">
            <div class="card">
                <h3>What you can search</h3>
                <p>Look up divisions, groups, classes, and subclasses.</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 IntelliCode Systems</p>
    </footer>

    <script>
        window.onload = () => {
            const input = document.getElementById('codeInput');
            const btn = document.getElementById('searchButton');

            btn.onclick = handleSearch;

            input.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    handleSearch();
                }
            });
        };

        async function handleSearch() {
            const input = document.getElementById('codeInput');
            const result = document.getElementById('searchResult');
            const title = document.getElementById('searchTitle');

            let code = (input.value || '').trim();

            if (!code) {
                result.innerHTML = '<p>Please enter a NIC code.</p>';
                return;
            }

            result.innerHTML = '<p>Searching...</p>';

            try {
                const res = await fetch(`/api/search/${code}`);
                const data = await res.json();

                if (!res.ok) {
                    result.innerHTML = '<p>No activity found.</p>';
                    return;
                }

                title.innerText = `Result for ${data.code}`;
                result.innerHTML = `
                    <div>
                        <strong>${data.code}</strong>
                        <p>${data.description}</p>
                    </div>
                `;
            } catch (err) {
                result.innerHTML = '<p style="color:red;">Search failed.</p>';
            }
        }
    </script>

</body>
</html>
